<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ACNH Slider</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="img/favicon.png" />
</head>
<body>

  <!-- ============================================
        PAGE WRAPPER
  -->

  <div class="page">

    <h1 class="title">ACNH - Image Slider</h1>
    <p class="subtitle">Animal Crossing New Horizons</p>
    <p class="subtitle">Museum Loop</p>

    <!-- Slider container -->
    <div class="slider">

      <!-- Each image has the class "slide" — only the first has "active" -->
      <img src="img/img1.jpg" class="slide active" alt="Slide 1" />
      <img src="img/img2.jpg" class="slide"        alt="Slide 2" />
      <img src="img/img3.jpg" class="slide"        alt="Slide 3" />
      <img src="img/img4.jpg" class="slide"        alt="Slide 4" />

      <!-- Dot indicators — one per slide -->
      <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

    </div>

  </div>

  <!-- ============================================
       LINK TO JAVASCRIPT
  -->
  <script src="script.js"></script>

  <!-- ============================================
       FOOTER
  -->
  <footer>
    <p>&copy; 2026 Image Slider Project - Míriam Domínguez Martínez | DBE Academy</p>
  </footer>

</body>
</html>
